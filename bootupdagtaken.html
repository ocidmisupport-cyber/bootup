let currentTaskIndex = 0;

function escapeHTML(text) {
  return String(text).replace(/[&<>"']/g, function(ch) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];
  });
}

function fillSelect() {
  const select = document.getElementById('taskSelect');
  select.innerHTML = tasks.map((task, index) => `<option value="${index}">${escapeHTML(task.title)}</option>`).join('');
}

function loadTask(index) {
  currentTaskIndex = Number(index);
  const task = tasks[currentTaskIndex];
  const menu = document.getElementById('stepMenu');
  menu.innerHTML = task.sections.map((section, i) =>
    `<button class="tab-button ${i === 0 ? 'active' : ''}" onclick="loadStep(${currentTaskIndex}, ${i})">${escapeHTML(section.menuLabel)}</button>`
  ).join('');
  loadStep(currentTaskIndex, 0);
}

function lineToCard(line) {
  const safe = escapeHTML(line);
  if (safe.includes(' | ')) {
    const parts = safe.split(' | ');
    const first = parts.shift();
    return `<div class="card"><strong>${first}</strong><span>${parts.join(' — ')}</span></div>`;
  }
  return `<div class="card"><span>${safe}</span></div>`;
}

function lineToStep(line, index) {
  const safe = escapeHTML(line);
  if (safe.includes(' | ')) {
    const parts = safe.split(' | ');
    const first = parts.shift();
    return `<div class="step-card"><strong>${first}</strong><span>${parts.join(' — ')}</span></div>`;
  }
  return `<div class="step-card"><strong>Stap ${index + 1}</strong><span>${safe}</span></div>`;
}

function loadStep(taskIndex, stepIndex) {
  currentTaskIndex = Number(taskIndex);
  document.querySelectorAll('.tab-button').forEach((button, i) => button.classList.toggle('active', i === stepIndex));
  const task = tasks[taskIndex];
  const section = task.sections[stepIndex];
  let html = `<span class="badge">${escapeHTML(task.title.split(' ')[0])}</span><h2>${escapeHTML(section.title)}</h2>`;

  if (section.kind === 'cards') {
    html += section.items.map(lineToCard).join('');
  } else if (section.kind === 'steps') {
    html += `<div class="steps-grid">` + section.items.map(lineToStep).join('') + `</div>`;
  } else if (section.kind === 'check') {
    html += section.items.map(item => `<div class="check-item">${escapeHTML(item)}</div>`).join('');
  } else {
    const items = section.items || [];
    let list = [];
    items.forEach((line, index) => {
      if (index < 2) html += `<p>${escapeHTML(line)}</p>`;
      else list.push(`<li>${escapeHTML(line)}</li>`);
    });
    if (list.length) html += `<ul>${list.join('')}</ul>`;
  }

  document.getElementById('contentPanel').innerHTML = html;
}

function loadPortfolio() {
  const task = tasks[currentTaskIndex];
  let index = task.sections.findIndex(section => section.menuLabel === 'Werkbon' || section.menuLabel === 'Portfolio');
  if (index < 0) index = task.sections.length - 1;
  loadStep(currentTaskIndex, index);
}

fillSelect();
loadTask(0);
